services:
  openclaw-gateway:
    container_name: openclaw-gateway
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: "16.0"
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    dns:
      - 223.5.5.5
      - 114.114.114.114
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      http_proxy: "${HTTP_PROXY:-}"  # TODO: Update to your actual proxy if needed
      https_proxy: "${HTTPS_PROXY:-}"  # TODO: Update to your actual proxy if needed
      no_proxy: "localhost,127.0.0.1,openclaw-gateway"
      HTTP_PROXY: "${HTTP_PROXY:-}"  # TODO: Update to your actual proxy if needed
      HTTPS_PROXY: "${HTTPS_PROXY:-}"  # TODO: Update to your actual proxy if needed
      NO_PROXY: "localhost,127.0.0.1,openclaw-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ./generated_code:/workspace/generated_code  # TODO: Update to your actual path if needed
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789", "--allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      http_proxy: "${HTTP_PROXY:-}"  # TODO: Update to your actual proxy if needed
      https_proxy: "${HTTPS_PROXY:-}"  # TODO: Update to your actual proxy if needed
      no_proxy: "localhost,127.0.0.1,openclaw-gateway"
      HTTP_PROXY: "${HTTP_PROXY:-}"  # TODO: Update to your actual proxy if needed
      HTTPS_PROXY: "${HTTPS_PROXY:-}"  # TODO: Update to your actual proxy if needed
      NO_PROXY: "localhost,127.0.0.1,openclaw-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ./generated_code:/workspace/generated_code  # TODO: Update to your actual path if needed
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["tail", "-f", "/dev/null"]
    depends_on:
      - openclaw-gateway
